{% extends 'home/base.html' %}
{% load static %}

{% block title %}Search - JetFlix{% endblock %}

{% block content %}
<style>
  .search-page {
    padding: 2rem 3rem;
    min-height: calc(100vh - 140px);
  }

  .search-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .search-header h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
    color: #fff;
  }

  .search-box {
    max-width: 600px;
    margin: 0 auto;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 1rem 3rem 1rem 1.5rem;
    font-size: 1.2rem;
    background: #333;
    border: 2px solid #555;
    border-radius: 50px;
    color: #fff;
    outline: none;
    transition: all 0.3s;
  }

  .search-input:focus {
    border-color: #e50914;
    background: #404040;
  }

  .search-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: #e50914;
    border: none;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }

  .search-btn:hover {
    background: #f40612;
  }

  .search-results {
    margin-top: 3rem;
  }

  .results-header {
    margin-bottom: 2rem;
  }

  .results-count {
    color: #b3b3b3;
    font-size: 1.1rem;
  }

  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  .movie-card {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
    background: #1a1a1a;
    aspect-ratio: 2/3;
  }

  .movie-card:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
  }

  .movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .movie-card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    padding: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .movie-card:hover .movie-card-overlay {
    opacity: 1;
  }

  .movie-card-overlay h3 {
    font-size: 1rem;
    margin-bottom: 0.5rem;
    color: #fff;
  }

  .movie-card-overlay p {
    font-size: 0.8rem;
    color: #b3b3b3;
  }

  .empty-search {
    text-align: center;
    padding: 4rem 2rem;
    color: #666;
  }

  .empty-search svg {
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    .search-page {
      padding: 1rem;
    }

    .search-header h1 {
      font-size: 2rem;
    }

    .movies-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
  }
</style>

<div class="search-page">
  <div class="search-header">
    <h1>Search Movies</h1>
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Search for movies...">
      <button class="search-btn" onclick="performSearch()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="search-results" id="searchResults" style="display: none;">
    <div class="results-header">
      <div class="results-count" id="resultsCount">0 movies found</div>
    </div>
    <div class="movies-grid" id="moviesGrid"></div>
  </div>

  <div class="empty-search" id="emptySearch">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <h3>Start searching for movies</h3>
    <p>Enter a movie title, genre, or actor name to find what you're looking for</p>
  </div>
</div>

<script>
  let searchTimeout;
  let searchResults = [];

  document.getElementById('searchInput').addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    const query = e.target.value.trim();
    
    if (query.length > 2) {
      searchTimeout = setTimeout(() => performSearch(), 300);
    } else if (query.length === 0) {
      showEmptyState();
    }
  });

  document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      performSearch();
    }
  });

  function performSearch() {
    const query = document.getElementById('searchInput').value.trim();
    
    if (query.length < 1) {
      showEmptyState();
      return;
    }

    fetch(`/api/search/?q=${encodeURIComponent(query)}`)
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          searchResults = data.movies;
          displayResults(data.movies, query);
        } else {
          displayResults([], query);
        }
      })
      .catch(error => {
        console.error('Search error:', error);
        displayResults([], query);
      });
  }

  function displayResults(movies, query) {
    const resultsSection = document.getElementById('searchResults');
    const emptySection = document.getElementById('emptySearch');
    const resultsCount = document.getElementById('resultsCount');
    const moviesGrid = document.getElementById('moviesGrid');

    emptySection.style.display = 'none';
    resultsSection.style.display = 'block';

    resultsCount.textContent = `${movies.length} movie${movies.length !== 1 ? 's' : ''} found for "${query}"`;

    if (movies.length === 0) {
      moviesGrid.innerHTML = `
        <div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #666;">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 1rem;">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <h3>No movies found</h3>
          <p>Try searching with different keywords</p>
        </div>
      `;
    } else {
      moviesGrid.innerHTML = movies.map((movie, index) => `
        <div class="movie-card" onclick="openSearchModal(${index})">
          <img src="${movie.thumbnail}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
          <div class="movie-card-overlay">
            <h3>${movie.title}</h3>
            <p>${movie.year} • ${movie.language}</p>
          </div>
        </div>
      `).join('');
    }
  }

  function showEmptyState() {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('emptySearch').style.display = 'block';
  }

  function openSearchModal(index) {
    const movie = searchResults[index];
    
    const modalHTML = `
      <div class="modal active" id="searchModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 1000; overflow-y: auto; justify-content: center; align-items: flex-start; padding: 40px 20px;">
        <div class="modal-content" style="background-color: #181818; border-radius: 12px; max-width: 850px; width: 100%; position: relative; box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);">
          <button class="modal-close" onclick="closeSearchModal()" style="position: absolute; top: 20px; right: 20px; background-color: #181818; border: none; color: #fff; font-size: 28px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10;">&times;</button>
          
          <div class="modal-hero" style="position: relative; height: 400px; background-size: cover; background-position: center; border-radius: 12px 12px 0 0; background-image: linear-gradient(to top, #181818 0%, transparent 100%), url('${movie.thumbnail}');">
            <div class="modal-hero-overlay" style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #181818, transparent); padding: 40px;">
              <h1 class="modal-title" style="font-size: 42px; font-weight: 700; margin-bottom: 10px;">${movie.title}</h1>
              <div class="modal-meta" style="display: flex; gap: 15px; align-items: center; font-size: 14px; color: #b3b3b3;">
                <span style="color: #46d369; font-weight: 600;">★ ${movie.rating.toFixed(1)}</span>
                <span>${movie.year}</span>
                <span>${movie.length || 'Unknown'}</span>
              </div>
            </div>
          </div>

          <div class="modal-body" style="padding: 30px 40px 40px;">
            <div class="modal-actions" style="display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap;">
              <button class="btn-primary" onclick="playSearchMovie(${movie.id}); closeSearchModal();" style="padding: 12px 28px; background-color: #fff; color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <span>▶</span> Play
              </button>
              <button class="btn-secondary" onclick="addSearchToWatchlist(${movie.id})" style="padding: 12px 28px; background-color: rgba(109, 109, 110, 0.7); color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <span>+</span> My List
              </button>
            </div>

            <p class="modal-description" style="font-size: 16px; line-height: 1.6; margin-bottom: 25px; color: #e5e5e5;">${movie.description || 'No description available.'}</p>

            <div class="modal-info" style="display: grid; gap: 15px; font-size: 14px;">
              <div style="display: flex; gap: 10px;">
                <span style="color: #777; min-width: 80px;">Cast:</span>
                <span style="color: #fff;">${movie.cast || 'Unknown'}</span>
              </div>
              <div style="display: flex; gap: 10px;">
                <span style="color: #777; min-width: 80px;">Genres:</span>
                <span style="color: #fff;">${movie.genres || 'Unknown'}</span>
              </div>
              <div style="display: flex; gap: 10px;">
                <span style="color: #777; min-width: 80px;">Language:</span>
                <span style="color: #fff;">${movie.language || 'Unknown'}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    document.body.insertAdjacentHTML('beforeend', modalHTML);
    document.body.style.overflow = 'hidden';
  }

  function closeSearchModal() {
    const modal = document.getElementById('searchModal');
    if (modal) {
      modal.remove();
      document.body.style.overflow = 'auto';
    }
  }

  function playSearchMovie(movieId) {
    const movie = searchResults.find(m => m.id === movieId);
    if (movie && movie.video) {
      if (typeof openJetflixPlayer === 'function') {
        openJetflixPlayer(movie.video, movie.title);
        closeSearchModal();
      } else {
        showNotification('Video player not available', 'error');
      }
    } else {
      showNotification('Video not available', 'error');
    }
  }

  function addSearchToWatchlist(movieId) {
    fetch('/movies/add_to_watchlist/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ movie_id: movieId })
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === 'success') {
        showNotification(data.action === 'added' ? 'Added to watchlist!' : 'Already in watchlist!', 'success');
      } else {
        showNotification('Error adding to watchlist', 'error');
      }
    })
    .catch(error => {
      console.error('Error:', error);
      showNotification('Error adding to watchlist', 'error');
    });
  }

  function showNotification(message, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();

    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.textContent = message;
    notification.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      padding: 16px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      animation: slideIn 0.3s ease-out;
    `;
    
    if (type === 'success') notification.style.background = '#4CAF50';
    if (type === 'error') notification.style.background = '#e50914';
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.style.animation = 'slideOut 0.3s ease-out';
      setTimeout(() => notification.remove(), 300);
    }, 3000);
  }

  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  // Close modal with Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeSearchModal();
    }
  });
</script>
{% endblock %}
