<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Jetflix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/fc164b4b-f085-44ee-bb7f-ec7df8539eff/d23a1608-7d90-4da1-93d6-bae2fe60a69b/IN-en-20230814-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: 0;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 1;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 2;
            margin: 80px auto;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 4px;
            padding: 60px 68px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .card-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .form-input:focus {
            outline: none;
            background: #454545;
            border-color: #e50914;
        }

        .form-input::placeholder {
            color: #666;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }

        .password-toggle:hover {
            color: #fff;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 4px;
            border-left: 3px solid #ff6b6b;
        }

        .primary-btn {
            width: 100%;
            padding: 16px;
            background: #e50914;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s ease;
        }

        .primary-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .primary-btn:not(:disabled):hover {
            background: #cc0812;
        }

        .secondary-action {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #888;
        }

        .secondary-action a {
            color: #fff;
            text-decoration: none;
        }

        .secondary-action a:hover {
            text-decoration: underline;
        }

        .payment-hint {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    
    <div class="login-container">
        <div class="login-card">
            <h1 class="card-title">Sign In</h1>
            <p class="card-subtitle">Welcome back to Jetflix</p>

            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' or message.tags == 'info' %}
                    <div class="error-message">{{ message }}</div>
                    {% endif %}
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <input 
                        type="text" 
                        name="username" 
                        class="form-input" 
                        placeholder="Username"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Password"
                            id="loginPassword"
                            required
                        >
                        <button type="button" class="password-toggle" id="passwordToggle">SHOW</button>
                    </div>
                </div>

                <button type="submit" class="primary-btn">Sign In</button>
            </form>

            <div class="secondary-action">
                New here? <a href="{% url 'register' %}">Create an account</a>
            </div>

            <div class="payment-hint">
                A one-time secure payment is required to unlock streaming.
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('loginPassword');
        const toggle = document.getElementById('passwordToggle');
        
        toggle.addEventListener('click', () => {
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = 'HIDE';
            } else {
                input.type = 'password';
                toggle.textContent = 'SHOW';
            }
        });
    </script>
</body>
</html>
